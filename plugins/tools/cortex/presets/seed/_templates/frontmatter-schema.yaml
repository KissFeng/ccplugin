version: 2
description: cortex vault 每目录 frontmatter 规范 (tag 派生由 cortex-save/cortex-ingest 走语义生成, schema 不再强制 hierarchical tags_required)
namespaces:
  知识库:
    项目:
      required: [type, title, host, org, created]
      optional: [tags, updated, repo, source_url, status, owner, started, ended, links, score, maturity]
      defaults:
        type: project
        status: active
      filename_pattern: "<slug>.md"
      note: "GitHub/GitLab/local git repo 与本地项目统一落 知识库/项目/<host>/<org>/<repo>/, host=local 时 org=basename"
    来源:
      网页:
        required: [type, title, source_kind, domain, url, created]
        optional: [tags, author, published, archive_url]
        defaults:
          type: source
          source_kind: web
      论文:
        required: [type, title, source_kind, year, created]
        optional: [tags, authors, doi, arxiv, venue]
        defaults:
          type: source
          source_kind: paper
      书籍:
        required: [type, title, source_kind, author, created]
        optional: [tags, isbn, year, publisher]
        defaults:
          type: source
          source_kind: book
    领域:
      "*":
        required: [type, title, domain, created]
        optional: [tags, prerequisites, related, evidence, confidence]
        defaults:
          type: concept
    日记:
      "*":
        required: [type, date, created]
        optional: [tags, mood, weather, summary]
        defaults:
          type: journal
        filename_pattern: "YYYY-MM-DD.md | YYYY-Wnn.md | YYYY-MM.md | YYYY.md"
    反思:
      洞察:
        required: [type, title, created]
        defaults: {type: insight}
      连接:
        required: [type, title, from_domain, to_domain, created]
        defaults: {type: connection}
      疑问:
        required: [type, title, status, created]
        defaults: {type: question, status: open}
    收件箱:
      "*":
        required: [type, title, created]
        defaults: {type: inbox}
  记忆:
    L0-核心:
      "*":
        required: [uri, level, weight, created, immutable]
        optional: [tags, ref, recall_when, parents, children]
        defaults:
          level: L0
          immutable: true
          needs_user_confirm: true
    L1-长期:
      procedural:
        required: [uri, level, weight, recall_when, created]
        defaults: {level: L1}
      semantic-stable:
        required: [uri, level, weight, recall_when, created]
        defaults: {level: L1}
    L2-中期:
      semantic:
        required: [uri, level, weight, recall_when, created, expires]
        defaults: {level: L2}
    L3-短期:
      episodic:
        required: [uri, level, weight, created, expires]
        defaults: {level: L3}

# tag 派生策略: 语义优先, hierarchical `xxx/yyy` lint 不禁但提示词不主动生.
# 详见 skills/cortex-ingest/references/global-rules.md §6
